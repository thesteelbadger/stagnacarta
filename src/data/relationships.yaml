# Stagnacarta Relationship Layer
# Single source of truth for all connections between content.
# All page templates derive their cross-reference tags from this file.
#
# Format:
#   - from: collection/slug
#     to: collection/slug
#     type: relationship-type
#
# Relationship types:
#   demonstrates - case study demonstrates mechanism
#   involves     - case study involves organ
#   exhibits     - organ exhibits mechanism

relationships:

  # ──────────────────────────────────────
  # HS2 Wendover Farm Track
  # ──────────────────────────────────────
  - from: case-studies/hs2-wendover-farm-track
    to: mechanisms/regulatory-accretion
    type: demonstrates

  - from: case-studies/hs2-wendover-farm-track
    to: mechanisms/accountability-diffusion
    type: demonstrates

  - from: case-studies/hs2-wendover-farm-track
    to: mechanisms/metric-capture
    type: demonstrates

  - from: case-studies/hs2-wendover-farm-track
    to: organs/environment-agency
    type: involves

  - from: case-studies/hs2-wendover-farm-track
    to: organs/local-authorities
    type: involves

  - from: case-studies/hs2-wendover-farm-track
    to: organs/hs2-ltd
    type: involves

  # ──────────────────────────────────────
  # SEND Crisis
  # ──────────────────────────────────────
  - from: case-studies/send-crisis
    to: mechanisms/accountability-diffusion
    type: demonstrates

  - from: case-studies/send-crisis
    to: mechanisms/metric-capture
    type: demonstrates

  - from: case-studies/send-crisis
    to: mechanisms/regulatory-accretion
    type: demonstrates

  - from: case-studies/send-crisis
    to: organs/department-for-education
    type: involves

  - from: case-studies/send-crisis
    to: organs/local-authorities
    type: involves

  # ──────────────────────────────────────
  # Post Office Horizon
  # ──────────────────────────────────────
  - from: case-studies/post-office-horizon
    to: mechanisms/metric-capture
    type: demonstrates

  - from: case-studies/post-office-horizon
    to: mechanisms/accountability-diffusion
    type: demonstrates

  - from: case-studies/post-office-horizon
    to: organs/post-office-ltd
    type: involves

  # ──────────────────────────────────────
  # Organ → Mechanism
  # ──────────────────────────────────────
  - from: organs/environment-agency
    to: mechanisms/regulatory-accretion
    type: exhibits

  - from: organs/environment-agency
    to: mechanisms/accountability-diffusion
    type: exhibits

  - from: organs/local-authorities
    to: mechanisms/accountability-diffusion
    type: exhibits

  - from: organs/local-authorities
    to: mechanisms/metric-capture
    type: exhibits

  - from: organs/department-for-education
    to: mechanisms/metric-capture
    type: exhibits

  - from: organs/department-for-education
    to: mechanisms/accountability-diffusion
    type: exhibits

  - from: organs/hs2-ltd
    to: mechanisms/regulatory-accretion
    type: exhibits

  - from: organs/hm-treasury
    to: mechanisms/metric-capture
    type: exhibits

  - from: organs/hm-treasury
    to: mechanisms/accountability-diffusion
    type: exhibits

  - from: organs/post-office-ltd
    to: mechanisms/metric-capture
    type: exhibits

  - from: organs/post-office-ltd
    to: mechanisms/accountability-diffusion
    type: exhibits
