server {
    listen 80;
    server_name stagnacarta.uk;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively - Cloudflare will cache at edge too
    location ~* \.(css|js|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(jpg|jpeg|png|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Clean URLs - Astro generates /page/index.html, serve as /page/
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    # Disable access log for favicon to reduce noise
    location = /favicon.svg {
        access_log off;
        expires 30d;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip - though Cloudflare handles this at edge, good to have for direct access
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
